apiVersion: apps/v1
kind: Deployment
metadata:
  name: devflow-frontend
  namespace: devflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devflow-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devflow-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/devflow-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: devflow-frontend
  namespace: devflow
spec:
  selector:
    app: devflow-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devflow-ingress
  namespace: devflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - devflow.yourdomain.com
      secretName: devflow-tls
  rules:
    - host: devflow.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devflow-backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devflow-frontend
                port:
                  number: 3000
