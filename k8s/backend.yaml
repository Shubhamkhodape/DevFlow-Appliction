apiVersion: apps/v1
kind: Deployment
metadata:
  name: devflow-backend
  namespace: devflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devflow-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devflow-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/devflow-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: devflow-backend
  namespace: devflow
spec:
  selector:
    app: devflow-backend
  ports:
    - port: 4000
      targetPort: 4000
