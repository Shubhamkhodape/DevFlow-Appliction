version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       devflow
      POSTGRES_USER:     devflow_user
      POSTGRES_PASSWORD: devflow_pass_local
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow_user -d devflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:       development
      PORT:           4000
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_NAME:        devflow
      DB_USER:        devflow_user
      DB_PASSWORD:    devflow_pass_local
      REDIS_URL:      redis://redis:6379
      JWT_SECRET:     local_dev_secret_change_in_prod
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL:   http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src   # hot-reload in dev

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
